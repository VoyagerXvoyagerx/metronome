<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>节拍器 | Metronome</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", Helvetica, Arial, sans-serif;
            background: #F5F5F7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #1D1D1F;
        }
        .container {
            background: #F5F5F7;
            width: 420px;
            padding: 30px 20px;
            text-align: center;
            position: relative;
        }
        .lang-switch {
            position: absolute;
            top: 10px;
            right: 15px;
            background: #fff;
            border: 1px solid #E5E5EA;
            border-radius: 8px;
            padding: 5px 12px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            color: #007AFF;
            transition: all 0.15s;
            font-family: inherit;
        }
        .lang-switch:hover {
            background: #F2F2F7;
        }
        .title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #1D1D1F;
        }
        .bpm-display {
            font-size: 72px;
            font-weight: bold;
            line-height: 1;
            margin: 20px 0 5px;
        }
        .bpm-label {
            font-size: 14px;
            color: #86868B;
            margin-bottom: 20px;
        }
        .lights {
            display: flex;
            justify-content: center;
            gap: 14px;
            margin: 20px 0;
            min-height: 28px;
        }
        .light {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #E5E5EA;
            transition: background 0.05s;
        }
        .light.active-accent {
            background: #FF3B30;
            box-shadow: 0 0 10px rgba(255, 59, 48, 0.5);
        }
        .light.active-beat {
            background: #007AFF;
            box-shadow: 0 0 10px rgba(0, 122, 255, 0.5);
        }
        .slider-container {
            margin: 25px 0;
            padding: 0 10px;
        }
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: #D1D1D6;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #007AFF;
            cursor: pointer;
            border: 3px solid #fff;
            box-shadow: 0 1px 4px rgba(0,0,0,0.2);
        }
        input[type="range"]::-moz-range-thumb {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #007AFF;
            cursor: pointer;
            border: 3px solid #fff;
            box-shadow: 0 1px 4px rgba(0,0,0,0.2);
        }
        .quick-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 15px 10px;
        }
        .quick-btn {
            padding: 8px 0;
            border: 1px solid #E5E5EA;
            background: #fff;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            color: #1D1D1F;
            transition: all 0.15s;
        }
        .quick-btn:hover {
            background: #F2F2F7;
            border-color: #D1D1D6;
        }
        .beat-selector {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin: 20px 0;
            font-size: 14px;
        }
        .beat-selector label {
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 6px;
            transition: background 0.15s;
        }
        .beat-selector label:hover {
            background: #E5E5EA;
        }
        .beat-selector input[type="radio"] {
            width: 16px;
            height: 16px;
            accent-color: #007AFF;
        }
        .play-btn {
            width: 200px;
            padding: 14px 0;
            margin: 20px auto;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            color: white;
            background: #007AFF;
            transition: background 0.2s, transform 0.1s;
            font-family: inherit;
        }
        .play-btn:hover {
            background: #0056b3;
        }
        .play-btn:active {
            transform: scale(0.97);
        }
        .play-btn.stopping {
            background: #FF3B30;
        }
        .play-btn.stopping:hover {
            background: #cc2e26;
        }
        .volume-container {
            margin-top: 20px;
            margin-bottom: 5px;
            padding: 0 25px;
        }
        .volume-label {
            font-size: 12px;
            color: #86868B;
            margin-bottom: 6px;
        }
        #volumeSlider {
            height: 4px;
        }
        #volumeSlider::-webkit-slider-thumb {
            width: 18px;
            height: 18px;
            border-width: 2px;
        }
        #volumeSlider::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-width: 2px;
        }
    </style>
</head>
<body>
    <div class="container">
        <button class="lang-switch" id="langSwitch">En</button>
        <div class="title" data-i18n="title">节拍器</div>
        <div class="bpm-display" id="bpmDisplay">80</div>
        <div class="bpm-label">BPM</div>
        
        <div class="lights" id="lights"></div>
        
        <div class="slider-container">
            <input type="range" id="bpmSlider" min="40" max="180" value="80">
        </div>
        
        <div class="quick-buttons">
            <button class="quick-btn" data-bpm="50">50</button>
            <button class="quick-btn" data-bpm="60">60</button>
            <button class="quick-btn" data-bpm="70">70</button>
            <button class="quick-btn" data-bpm="80">80</button>
            <button class="quick-btn" data-bpm="90">90</button>
            <button class="quick-btn" data-bpm="100">100</button>
            <button class="quick-btn" data-bpm="110">110</button>
            <button class="quick-btn" data-bpm="120">120</button>
        </div>
        
        <div class="beat-selector">
            <span data-i18n="beatLabel">节拍:</span>
            <label><input type="radio" name="beats" value="2"> 2/4</label>
            <label><input type="radio" name="beats" value="3"> 3/4</label>
            <label><input type="radio" name="beats" value="4" checked> 4/4</label>
            <label><input type="radio" name="beats" value="6"> 6/8</label>
        </div>
        
        <button class="play-btn" id="playBtn" data-i18n="play">▶ 启 动 (空格)</button>
        
        <div class="volume-container">
            <div class="volume-label"><span data-i18n="volumeLabel">音量:</span> <span id="volumeValue">100%</span></div>
            <input type="range" id="volumeSlider" min="0" max="100" value="100">
        </div>
    </div>

    <script>
        // ==================== 国际化 ====================
        const i18n = {
            zh: {
                title: '节拍器',
                beatLabel: '节拍:',
                volumeLabel: '音量:',
                play: '▶ 启 动 (空格)',
                stop: '■ 停 止 (空格)'
            },
            en: {
                title: 'Metronome',
                beatLabel: 'Time:',
                volumeLabel: 'Volume:',
                play: '▶ START (Space)',
                stop: '■ STOP (Space)'
            }
        };

        let currentLang = 'zh';
        const langSwitch = document.getElementById('langSwitch');

        function updateLanguage() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18n[currentLang][key]) {
                    el.textContent = i18n[currentLang][key];
                }
            });
            // 更新按钮状态文本（如果正在播放）
            if (isPlaying) {
                playBtn.textContent = i18n[currentLang].stop;
            } else {
                playBtn.textContent = i18n[currentLang].play;
            }
            langSwitch.textContent = currentLang === 'zh' ? 'En' : '中';
            document.documentElement.lang = currentLang === 'zh' ? 'zh-CN' : 'en';
        }

        langSwitch.addEventListener('click', () => {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            updateLanguage();
        });

        // ==================== 节拍器核心 ====================
        let bpm = 80;
        let beatsPerMeasure = 4;
        let currentBeat = 0;
        let isPlaying = false;
        let audioCtx = null;
        let nextNoteTime = 0;
        let timerID = null;
        let rafID = null;
        const lookahead = 10.0; // ms: 更频繁地检查调度
        const scheduleAheadTime = 0.2; // s: 增加提前量，确保高 BPM 也能稳定调度
        let notesInQueue = []; // 已调度音符队列，用于 UI 同步
        let noiseBufferCache = null; // 预生成噪声 buffer，避免重复创建

        const bpmDisplay = document.getElementById('bpmDisplay');
        const bpmSlider = document.getElementById('bpmSlider');
        const lightsContainer = document.getElementById('lights');
        const playBtn = document.getElementById('playBtn');
        const beatRadios = document.querySelectorAll('input[name="beats"]');
        const quickBtns = document.querySelectorAll('.quick-btn');

        let gainNode = null;
        let bufferHigh = null;
        let bufferLow = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            if (!gainNode) {
                gainNode = audioCtx.createGain();
                gainNode.connect(audioCtx.destination);
                gainNode.gain.value = 1.0;
            }
            // 预生成两种声音 buffer（与 pygame 版完全一致，避免 OscillatorNode 相位随机性）
            if (!bufferHigh) {
                bufferHigh = generateClickBuffer(1200, 0.035, 0.90, 0.25);
            }
            if (!bufferLow) {
                bufferLow = generateClickBuffer(800, 0.035, 0.85, 0.15);
            }
        }

        // 复现 metronome.py 的 generate_click_pygame 算法，生成静态 AudioBuffer
        // 关键：预生成波形后，每次播放都是完全一致的样本，彻底消除音量波动
        function generateClickBuffer(freq, duration, volume, noiseAmount) {
            const sampleRate = audioCtx.sampleRate;
            const numSamples = Math.ceil(sampleRate * duration);
            const buffer = audioCtx.createBuffer(1, numSamples, sampleRate);
            const data = buffer.getChannelData(0);

            for (let i = 0; i < numSamples; i++) {
                const t = i / sampleRate;

                // 极短的起音 + 更快的指数衰减
                const attack = Math.min(1.0, t / 0.0015);
                const envelope = attack * Math.exp(-140 * t);

                // 音高下坠 (Pitch Drop)
                const pitchDrop = Math.exp(-300 * t);
                const currentFreq = freq * (1.0 + 0.35 * pitchDrop);

                // 主频 + 非整数倍泛音
                const tone = (
                    0.78 * Math.sin(2 * Math.PI * currentFreq * t)
                    + 0.22 * Math.sin(2 * Math.PI * currentFreq * 1.55 * t)
                );

                // 极短噪声
                const noiseEnv = Math.exp(-350 * t);
                const noise = (Math.random() * 2 - 1) * noiseAmount * noiseEnv;

                let sample = (tone * envelope + noise) * volume;

                // 防止削波
                sample = Math.max(-1.0, Math.min(1.0, sample));
                data[i] = sample;
            }

            return buffer;
        }

        // 播放预先生成的 buffer，与 pygame 版行为完全一致
        function playClick(beatIndex, time) {
            if (!audioCtx) return;

            const buffer = (beatIndex === 0) ? bufferHigh : bufferLow;
            if (!buffer) return;

            const source = audioCtx.createBufferSource();
            source.buffer = buffer;
            source.connect(gainNode || audioCtx.destination);
            source.start(time);
        }

        function updateLights(beatIndex) {
            const lights = document.querySelectorAll('.light');
            lights.forEach((light, i) => {
                light.classList.remove('active-accent', 'active-beat');
                if (i === beatIndex) {
                    light.classList.add(beatIndex === 0 ? 'active-accent' : 'active-beat');
                }
            });
        }

        function createLights() {
            lightsContainer.innerHTML = '';
            for (let i = 0; i < beatsPerMeasure; i++) {
                const div = document.createElement('div');
                div.className = 'light';
                lightsContainer.appendChild(div);
            }
        }

        // 核心调度器：使用更大的 scheduleAheadTime 和更频繁的检查
        function scheduler() {
            // 时间漂移保护：如果落后超过 100ms，重新同步到当前时间
            if (nextNoteTime < audioCtx.currentTime - 0.1) {
                nextNoteTime = audioCtx.currentTime + 0.02;
            }

            while (nextNoteTime < audioCtx.currentTime + scheduleAheadTime) {
                scheduleNote(currentBeat, nextNoteTime);
                nextNote();
            }
            timerID = setTimeout(scheduler, lookahead);
        }

        function scheduleNote(beatIndex, time) {
            // 将音符加入队列，供 requestAnimationFrame UI 循环消费
            notesInQueue.push({ beatIndex, time });
            playClick(beatIndex, time);
        }

        // 使用 requestAnimationFrame 更新 UI，避免 setTimeout 堆积导致的抖动
        function uiLoop() {
            if (!isPlaying) return;
            const currentTime = audioCtx.currentTime;
            // 处理所有已经到达播放时间的音符
            while (notesInQueue.length > 0 && notesInQueue[0].time <= currentTime) {
                const note = notesInQueue.shift();
                updateLights(note.beatIndex);
            }
            rafID = requestAnimationFrame(uiLoop);
        }

        function nextNote() {
            const secondsPerBeat = 60.0 / bpm;
            nextNoteTime += secondsPerBeat;
            currentBeat = (currentBeat + 1) % beatsPerMeasure;
        }

        function togglePlay() {
            if (isPlaying) {
                stop();
            } else {
                play();
            }
        }

        function play() {
            initAudio();
            isPlaying = true;
            currentBeat = 0;
            notesInQueue = [];
            nextNoteTime = audioCtx.currentTime + 0.05;
            scheduler();
            rafID = requestAnimationFrame(uiLoop);
            playBtn.textContent = i18n[currentLang].stop;
            playBtn.classList.add('stopping');
        }

        function stop() {
            isPlaying = false;
            clearTimeout(timerID);
            cancelAnimationFrame(rafID);
            notesInQueue = [];
            playBtn.textContent = i18n[currentLang].play;
            playBtn.classList.remove('stopping');
            document.querySelectorAll('.light').forEach(l => {
                l.classList.remove('active-accent', 'active-beat');
            });
        }

        // 事件监听
        bpmSlider.addEventListener('input', (e) => {
            bpm = parseInt(e.target.value);
            bpmDisplay.textContent = bpm;
        });

        quickBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                bpm = parseInt(btn.dataset.bpm);
                bpmSlider.value = bpm;
                bpmDisplay.textContent = bpm;
            });
        });

        beatRadios.forEach(radio => {
            radio.addEventListener('change', (e) => {
                beatsPerMeasure = parseInt(e.target.value);
                currentBeat = 0;
                createLights();
            });
        });

        const volumeSlider = document.getElementById('volumeSlider');
        const volumeValue = document.getElementById('volumeValue');
        volumeSlider.addEventListener('input', (e) => {
            const val = parseInt(e.target.value);
            if (gainNode) {
                gainNode.gain.value = val / 100;
            }
            volumeValue.textContent = val + '%';
        });

        playBtn.addEventListener('click', togglePlay);

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });

        // 初始化
        createLights();
    </script>
</body>
</html>
